<!DOCTYPE html>
<html>
    <head>
        <title>Sasso, carta e forbice</title>
    </head>
    <body>
    
        <h1 style="text-align: center;font-size: 50px;user-select: none;">Sasso, carta e forbice</h1>
            <center>
                <div class="containerg">
                    <center>
                        <p style="font-size: 20px; user-select: none;"><b>Giocatore</b></p>
                    </center>
                    <div>
                        <img src="https://www.iconsdb.com/icons/preview/gray/rock-xxl.png" id="SassoG" class="icon">
                        <img src="https://www.iconsdb.com/icons/preview/gray/paper-xxl.png" id="CartaG" class="icon">
                        <img src="https://www.iconsdb.com/icons/preview/gray/scissors-xxl.png" id="ForbiceG" class="icon">
                    </div>
                </div>
                <div class="staccehtto"></div>
                <div class="containerp">
                    <center>
                        <p style="font-size: 20px; user-select: none;"><b>PC</b></p>
                    </center>
                    <div>
                        <img src="https://www.iconsdb.com/icons/preview/gray/rock-xxl.png" id="SassoP" class="icon">
                        <img src="https://www.iconsdb.com/icons/preview/gray/paper-xxl.png" id="CartaP" class="icon">
                        <img src="https://www.iconsdb.com/icons/preview/gray/scissors-xxl.png" id="ForbiceP" class="icon">
                    </div>
                </div>
                
                <div class="notifica" id="notifica">
                    <p id="testoNotifica" style="font-size: 18px; user-select: none;">
                        cazzo guardi
                    </p>
                    <button onclick="location.reload()" style="margin-top:10px; border-radius: 5px;">Ritenta la fortuna</button>
                    
                </div>
                
            </center>
    </body>

    <style>
        
        .containerg{
            position: absolute;
            width: 80px;
            left: 38%;
        }
        
        .staccehtto{
            position: absolute;
            left: 48%;
            width: 5px;
            height: 51%;
            background-color: #000;
        }
        .containerp{
            position: absolute;
            width: 80px;
            left: 53%;
        }
        
        .icon{
            height: 64px;
            width: 64px;
            margin: 10px;
            user-select: none;
        }
        
        #riprova{
            position: absolute;
            border-radius: 5px;
            top: 66%;
            left: calc(46% + 5px);
            border-top: 2px solid black;
            border-left: 2px solid black;;
            border-right: 2px solid black;;
        }
        
        .notifica{
            position: absolute;
            background: rgba(128, 128, 128, 0.719);
            top:25%;
            left: calc(39% + 3px);
            width: 300px;
            height: 100px;
            border: 1px solid blue;
            border-radius: 10px;
            visibility: hidden;
            
        }
    
    </style>
    
    <script>
    
        var g = [];
        var p = []
    
        const sg = document.getElementById("SassoG")
        const cg = document.getElementById("CartaG")
        const fg = document.getElementById("ForbiceG")
        
        sg.addEventListener("click", function(){
            cg.style.visibility = "hidden";
            fg.style.visibility = "hidden";
            g.push(1)
            start()
        })
        
        cg.addEventListener("click", function(){
            sg.style.visibility = "hidden";
            fg.style.visibility = "hidden";
            g.push(2)
            start()
        })
        
        fg.addEventListener("click", function(){
            sg.style.visibility = "hidden";
            cg.style.visibility = "hidden";
            g.push(3)
            start()
        })
        
        
        var r = parseInt(Math.random()*1000) % 3 + 1;
        
        const sp = document.getElementById("SassoP") // 1
        const cp = document.getElementById("CartaP") // 2
        const fp = document.getElementById("ForbiceP") // 3
        
        const notifica = document.getElementById("notifica");
        const testoNotifica = document.getElementById("testoNotifica");
        
        function Notifica(testo){
        
            notifica.style.visibility = "visible";
            testoNotifica.innerHTML = testo;
        }
        
        
        function start(){    
        
            console.log("Numero Estratto:",r);
            if(g[0] == r && r == 3) r = r - 2;
            if (g[0] == r && r == 2) r = r + 1;
            if (g[0] == r && r == 1) r = r + 1;
            console.log("Giocatore:", g[0]);
            console.log("PC:", r);
            
            if(r == 1) { // sasso
                cp.style.visibility = "hidden";
                fp.style.visibility = "hidden";
            }
            else if(r == 2){ // carta
                sp.style.visibility = "hidden";
                fp.style.visibility = "hidden";
            }else{ // forbice
                sp.style.visibility = "hidden";
                cp.style.visibility = "hidden";
            }
            g = g[0];
            p = r;
            // console.log(g,p);
            
            setTimeout(function(){
                
                if((p == 1 && g == 2) || (p == 2 && g == 3) || (p == 3 && g == 1)) Notifica("Hai vinto!");
                if((p == 1 && g == 3) || (p == 2 && g == 1) || (p == 3 && g == 2)) Notifica("Mi dispiace, hai perso");

                
            }, 500);
            
        }
        
        
        
    </script>
    
</html>
